<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gopal Gaushala</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef3ff;
}

.header{
background:#2f6fd1;
color:white;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.menu button{
padding:16px;
font-size:18px;
background:#2f6fd1;
color:yellow;
border:none;
border-radius:10px;
}

.page{display:none}

input,select{
width:100%;
padding:10px;
font-size:18px;
margin-top:6px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
font-size:18px;
background:#2f6fd1;
color:yellow;
border:none;
border-radius:10px;
margin-top:6px;
}

.back{
background:#444;
color:white;
}

.row{
display:flex;
align-items:center;
justify-content:space-between;
background:white;
padding:8px;
margin-bottom:6px;
border-radius:8px;
}

.qty{
font-size:20px;
min-width:25px;
text-align:center;
}

.qbtn{
width:32px;
height:32px;
font-size:20px;
border:none;
background:#2f6fd1;
color:yellow;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">🐄 GOPAL GAUSHALA</div>

<div class="container">

<!-- HOME -->

<div id="home" class="page">

<div class="menu">

<button onclick="showPage('entry')">TODAY ENTRY</button>
<button onclick="showPage('master')">CUSTOMERS</button>
<button onclick="showPage('billing')">BILLING</button>
<button onclick="showPage('payment')">PAYMENT</button>

</div>

</div>

<!-- CUSTOMER MASTER -->

<div id="master" class="page">

<h3>Customer</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<select id="type">
<option value="P">Pickup</option>
<option value="D">Delivery</option>
</select>

<input id="mqty" placeholder="Std Morning Qty">
<input id="eqty" placeholder="Std Evening Qty">

<button onclick="saveCustomer()">SAVE</button>

<div id="custList"></div>

<button class="back" onclick="showPage('home')">BACK</button>

</div>

<!-- DAILY ENTRY -->

<div id="entry" class="page">

<h3>Daily Entry</h3>

<input type="date" id="date">

<div id="entryList"></div>

<button onclick="saveEntry()">SAVE ENTRY</button>

<button class="back" onclick="showPage('home')">BACK</button>

</div>

<!-- BILLING -->

<div id="billing" class="page">

<h3>Billing</h3>

<select id="billCust"></select>

<button onclick="generateBill()">GENERATE BILL</button>

<div id="bill"></div>

<button onclick="sendWA()">Send WhatsApp</button>

<button class="back" onclick="showPage('home')">BACK</button>

</div>

<!-- PAYMENT -->

<div id="payment" class="page">

<h3>Payment</h3>

<select id="payCust"></select>

<input id="billAmt" placeholder="Bill Amount">

<input id="recAmt" placeholder="Received Amount">

<button onclick="savePayment()">SAVE</button>

<button class="back" onclick="showPage('home')">BACK</button>

</div>

</div>

<script>

/* PAGE NAVIGATION */

function showPage(p){

document.querySelectorAll(".page").forEach(x=>x.style.display="none")

document.getElementById(p).style.display="block"

if(p=="master") loadCustomers()
if(p=="entry") loadEntry()
if(p=="billing") loadBilling()
if(p=="payment") loadPayment()

}

showPage("home")

/* CUSTOMER STORAGE */

function getCustomers(){
return JSON.parse(localStorage.getItem("cust")||"[]")
}

function saveCustomers(c){
localStorage.setItem("cust",JSON.stringify(c))
}

function saveCustomer(){

let c=getCustomers()

c.push({
name:name.value,
phone:phone.value,
type:type.value,
m:parseInt(mqty.value)||0,
e:parseInt(eqty.value)||0
})

saveCustomers(c)

name.value=""
phone.value=""
mqty.value=""
eqty.value=""

loadCustomers()

}

function loadCustomers(){

let list=document.getElementById("custList")
list.innerHTML=""

getCustomers().forEach((c,i)=>{

let d=document.createElement("div")
d.className="row"
d.innerHTML=c.name+" ("+c.type+")"

list.appendChild(d)

})

}

/* DAILY ENTRY */

function loadEntry(){

date.value=new Date().toISOString().split("T")[0]

let list=document.getElementById("entryList")
list.innerHTML=""

getCustomers().forEach(c=>{

let r=document.createElement("div")
r.className="row"
r.dataset.name=c.name

let m=c.m||0
let e=c.e||0

r.innerHTML="<b>"+c.name+"</b> M "

let mminus=btn("-",()=>chg(r,0,-1))
let mval=val(m)
let mplus=btn("+",()=>chg(r,0,1))

let eminus=btn("-",()=>chg(r,1,-1))
let evalv=val(e)
let eplus=btn("+",()=>chg(r,1,1))

r.append(mminus,mval,mplus," E ",eminus,evalv,eplus)

list.appendChild(r)

})

}

function btn(t,f){
let b=document.createElement("button")
b.className="qbtn"
b.innerText=t
b.onclick=f
return b
}

function val(v){
let s=document.createElement("span")
s.className="qty"
s.innerText=parseInt(v)||0
return s
}
</div>

<script>
function chg(r,i,d){

let v=r.querySelectorAll(".qty")
let n=parseInt(v[i].innerText)+d
if(n<0)n=0
v[i].innerText=n

}

function saveEntry(){

let d=date.value
let rows=document.querySelectorAll(".row")

let data=JSON.parse(localStorage.getItem("entries")||"{}")

data[d]={}

rows.forEach(r=>{

let name=r.dataset.name
let v=r.querySelectorAll(".qty")

data[d][name]={
m:parseInt(v[0].innerText)||0,
e:parseInt(v[1].innerText)||0
}

})

localStorage.setItem("entries",JSON.stringify(data))

alert("Entry Saved")

showPage("home")

}

/* BILLING */

function loadBilling(){

billCust.innerHTML=""

getCustomers().forEach(c=>{

let o=document.createElement("option")
o.value=c.name
o.textContent=c.name

billCust.appendChild(o)

})

}

function generateBill(){

let name=billCust.value
let entries=JSON.parse(localStorage.getItem("entries")||{})

let total=0

Object.values(entries).forEach(day=>{
if(day[name]){
total+=day[name].m+day[name].e
}
})

let amt=total*90

bill.innerHTML="Milk "+total+" L<br>Total ₹"+amt

localStorage.setItem("lastBill",amt)

}

function sendWA(){

let txt=bill.innerText
window.open("https://wa.me/?text="+encodeURIComponent(txt))

}

/* PAYMENT */

function loadPayment(){

payCust.innerHTML=""

getCustomers().forEach(c=>{

let o=document.createElement("option")
o.value=c.name
o.textContent=c.name

payCust.appendChild(o)

})

billAmt.value=localStorage.getItem("lastBill")||""

}

function savePayment(){
alert("Payment Saved")
}

</script>

</body>
</html>
