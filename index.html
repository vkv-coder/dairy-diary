<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dairy Milk</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f7ff
}

.header{
background:#1e6bd6;
color:white;
text-align:center;
padding:15px;
font-size:22px
}

.container{
padding:12px
}

.dashboard{
background:white;
padding:12px;
border-radius:8px;
margin-bottom:12px
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px
}

.box{
background:#1e6bd6;
color:yellow;
padding:18px;
text-align:center;
border-radius:10px;
font-size:18px
}

.row{
background:white;
padding:10px;
border-radius:8px;
margin-bottom:10px
}

button{
background:#1e6bd6;
color:yellow;
border:none;
padding:10px;
margin-top:6px;
border-radius:6px;
font-size:16px
}

.qtybtn{
font-size:22px;
width:40px;
height:40px
}

.paid{
margin-left:10px
}

.green{
background:green!important;
color:white!important
}

</style>
</head>

<body>

<div class="header">🥛 Dairy Milk</div>

<div class="container" id="home">

<div class="dashboard" id="totals"></div>

<div class="menu">

<div class="box" onclick="show('entry')">TODAY ENTRY</div>
<div class="box" onclick="show('master')">CUSTOMER MASTER</div>
<div class="box" onclick="show('billing')">BILLING</div>
<div class="box" onclick="show('payments')">PAYMENTS</div>

</div>

</div>


<div class="container" id="master" style="display:none">

<h3>Add Customer</h3>

<input id="name" placeholder="Customer Name">

Morning Qty
<input id="mqty" type="number" step="0.5" value="1">

Evening Qty
<input id="eqty" type="number" step="0.5" value="0">

<label>
<input type="checkbox" id="stop"> Temp Stop Delivery
</label>

<button onclick="addCustomer()">SAVE</button>
<button onclick="show('home')">BACK</button>

<div id="custList"></div>

</div>


<div class="container" id="entry" style="display:none">

<h3>Entry Date</h3>
<input type="date" id="entryDate">

<div id="entryList"></div>

<button onclick="saveEntry()">SAVE ENTRY</button>
<button onclick="show('home')">BACK</button>

</div>


<div class="container" id="billing" style="display:none">

<h3>Billing</h3>

<select id="billCustomer"></select>

<button onclick="viewLedger()">VIEW LEDGER</button>

<div id="ledger"></div>

<button onclick="generateBill()">GENERATE BILL</button>

<div id="billResult"></div>

<button onclick="show('home')">BACK</button>

</div>


<div class="container" id="payments" style="display:none">

<h3>Payments</h3>

<div id="paymentList"></div>

<button onclick="show('home')">BACK</button>

</div>


<script>

function show(id){

['home','master','entry','billing','payments'].forEach(x=>{
document.getElementById(x).style.display='none'
})

document.getElementById(id).style.display='block'

if(id=="entry")loadEntry()
if(id=="master")loadCustomers()
if(id=="billing")loadCustomerDropdown()
if(id=="home")loadDashboard()

}

function getCustomers(){
return JSON.parse(localStorage.getItem("customers")||"[]")
}

function addCustomer(){

let customers=getCustomers()

customers.push({
name:document.getElementById("name").value,
mqty:parseFloat(document.getElementById("mqty").value),
eqty:parseFloat(document.getElementById("eqty").value),
stop:document.getElementById("stop").checked
})

localStorage.setItem("customers",JSON.stringify(customers))

alert("Saved")

loadCustomers()

}

function loadCustomers(){

let customers=getCustomers()

let html=""

customers.forEach(c=>{
html+="<div>"+c.name+"</div>"
})

document.getElementById("custList").innerHTML=html

}

function loadEntry(){

let customers=getCustomers()

let html=""

customers.forEach((c,i)=>{

if(c.stop)return

html+=`

<div class="row">

<b>${c.name}</b>

<br><br>

Morning

<button class="qtybtn" onclick="chg(${i},'m',-0.5)">-</button>
<span id="m${i}">${c.mqty}</span>
<button class="qtybtn" onclick="chg(${i},'m',0.5)">+</button>

<button class="paid" id="mp${i}" onclick="paid(this)">PAID</button>

<br><br>

Evening

<button class="qtybtn" onclick="chg(${i},'e',-0.5)">-</button>
<span id="e${i}">${c.eqty}</span>
<button class="qtybtn" onclick="chg(${i},'e',0.5)">+</button>

<button class="paid" id="ep${i}" onclick="paid(this)">PAID</button>

</div>

`
})

document.getElementById("entryList").innerHTML=html

}

function chg(i,type,val){

let el=document.getElementById(type+i)

let v=parseFloat(el.innerText)+val

if(v<0)v=0

el.innerText=v

}

function paid(btn){

btn.classList.toggle("green")

alert("Payment saved")

}

function saveEntry(){

let date=document.getElementById("entryDate").value

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let customers=getCustomers()

entries[date]=[]

customers.forEach((c,i)=>{

let m=document.getElementById("m"+i)
let e=document.getElementById("e"+i)

if(!m)return

entries[date].push({
name:c.name,
mqty:parseFloat(m.innerText),
eqty:parseFloat(e.innerText)
})

})

localStorage.setItem("entries",JSON.stringify(entries))

alert("Saved")

loadDashboard()

}

function loadDashboard(){

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let today=new Date().toISOString().slice(0,10)

let mt=0
let et=0

if(entries[today]){

entries[today].forEach(e=>{
mt+=e.mqty
et+=e.eqty
})

}

let rate=localStorage.getItem("milkRate")||90

let total=(mt+et)*rate

document.getElementById("totals").innerHTML=

"Morning : "+mt+" L<br>"+
"Evening : "+et+" L<br>"+
"Total Milk : "+(mt+et)+" L<br>"+
"Amount : ₹"+total

}

function loadCustomerDropdown(){

let customers=getCustomers()

let html=""

customers.forEach(c=>{
html+="<option>"+c.name+"</option>"
})

document.getElementById("billCustomer").innerHTML=html

}

function viewLedger(){

let name=document.getElementById("billCustomer").value

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let html=""

Object.keys(entries).forEach(d=>{

entries[d].forEach(e=>{

if(e.name==name){

let milk=e.mqty+e.eqty

let rate=90

let amt=milk*rate

html+=d+" - "+milk+" L ₹"+amt+
" <button onclick='sendWA(this,\""+name+"\","+milk+","+amt+")'>SEND</button><br>"

}

})

})

document.getElementById("ledger").innerHTML=html

}

function sendWA(btn,name,milk,amt){

btn.classList.add("green")

let text="Milk Bill%0A%0ACustomer:"+name+"%0AMilk:"+milk+"L%0AAmount:₹"+amt

window.open("https://wa.me/?text="+text)

}

function generateBill(){

let name=document.getElementById("billCustomer").value

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let total=0

Object.keys(entries).forEach(d=>{

entries[d].forEach(e=>{

if(e.name==name){
total+=e.mqty+e.eqty
}

})

})

let rate=90

let amt=total*rate

document.getElementById("billResult").innerHTML=

"Milk : "+total+" L<br>"+
"Amount : ₹"+amt

}

loadDashboard()

</script>

</body>
</html>
