<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gopal Gaushala</title>

<style>

body{font-family:Arial;margin:0;background:#eef3ff}

.header{
background:#2f6fd1;
color:#fff;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold
}

.container{
max-width:520px;
margin:auto;
padding:15px
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px
}

.menu button{
padding:16px;
font-size:18px;
background:#2f6fd1;
color:yellow;
border:none;
border-radius:10px
}

.page{display:none}

input,select{
width:100%;
padding:10px;
font-size:16px;
margin-top:6px;
margin-bottom:10px
}

button{
padding:10px;
font-size:15px;
background:#2f6fd1;
color:yellow;
border:none;
border-radius:6px;
margin-top:6px
}

.back{
background:#444;
color:#fff;
width:100%
}

table{
width:100%;
border-collapse:collapse;
background:white
}

th,td{
padding:8px;
border-bottom:1px solid #ccc
}

th{text-align:left}

</style>

</head>

<body>

<div class="header">🐄 GOPAL GAUSHALA</div>

<div class="container">

<div id="home" class="page" style="display:block">

<div class="menu">

<button onclick="show('entry')">TODAY ENTRY</button>

<button onclick="show('master')">CUSTOMERS</button>

<button onclick="show('billing')">BILLING</button>

<button onclick="show('payment')">PAYMENT</button>

<button onclick="show('ledger')">LEDGER</button>

<button onclick="show('settings')">SETTINGS</button>

</div>

</div>


<div id="master" class="page">

<h3>Customer Master</h3>

<input id="cname" placeholder="Customer Name">

<select id="ctype">
<option value="P">Pickup</option>
<option value="D">Delivery</option>
</select>

<button onclick="saveCustomer()">SAVE CUSTOMER</button>

<div id="custList"></div>

<button class="back" onclick="show('home')">BACK</button>

</div>


<div id="entry" class="page">

<h3>Daily Entry</h3>

<input type="date" id="entryDate">

<select id="entryType">
<option value="P">Pickup</option>
<option value="D">Delivery</option>
</select>

<button onclick="loadEntry()">LOAD ENTRY</button>

<div id="entryList"></div>

<button onclick="saveEntry()">SAVE ENTRY</button>

<button class="back" onclick="show('home')">BACK</button>

</div>


<div id="billing" class="page">

<h3>Billing</h3>

<select id="billCustomer"></select>

<label>From Date</label>
<input type="date" id="billFrom">

<label>To Date</label>
<input type="date" id="billTo">

<button onclick="generateBill()">GENERATE BILL</button>

<button onclick="generateAllBills()">GENERATE ALL BILLS</button>

<div id="billResult"></div>

<button class="back" onclick="show('home')">BACK</button>

</div>


<div id="payment" class="page">

<h3>Payment</h3>

<select id="payCustomer"></select>

<input id="recAmt" placeholder="Received Amount">

<button onclick="savePayment()">SAVE PAYMENT</button>

<button class="back" onclick="show('home')">BACK</button>

</div>


<div id="ledger" class="page">

<h3>Ledger</h3>

<select id="ledgerType">
<option value="ALL">All</option>
<option value="P">Pickup</option>
<option value="D">Delivery</option>
</select>

<label>From Date</label>
<input type="date" id="ledgerFrom">

<label>To Date</label>
<input type="date" id="ledgerTo">

<button onclick="loadLedger()">LOAD LEDGER</button>

<div id="ledgerResult"></div>

<button class="back" onclick="show('home')">BACK</button>

</div>

<script>

function show(p){

document.querySelectorAll(".page").forEach(x=>x.style.display="none")

document.getElementById(p).style.display="block"

if(p=="master")loadCustomers()

if(p=="billing")loadBilling()

if(p=="payment")loadPayment()

if(p=="ledger")loadLedger()

if(p=="settings")loadRates()

}



function getCustomers(){

return JSON.parse(localStorage.getItem("customers")||"[]")

}



function saveCustomer(){

let c=getCustomers()

c.push({

name:cname.value,

type:ctype.value

})

localStorage.setItem("customers",JSON.stringify(c))

cname.value=""

loadCustomers()

}



function loadCustomers(){

custList.innerHTML=""

getCustomers().forEach((c,i)=>{

let d=document.createElement("div")

d.innerHTML=c.name+" ("+(c.type=="D"?"Delivery":"Pickup")+")"

custList.appendChild(d)

})

}



function loadBilling(){

billCustomer.innerHTML=""

getCustomers().forEach(c=>{

let o=document.createElement("option")

o.value=c.name

o.innerText=c.name

billCustomer.appendChild(o)

})

}



function generateBill(){

let name=billCustomer.value

let from=billFrom.value

let to=billTo.value

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let total=0

Object.keys(entries).forEach(d=>{

if(d>=from && d<=to){

let day=entries[d]

if(day[name] && !day[name].c){

total+=day[name].m+day[name].e

}

}

})

let c=getCustomers().find(x=>x.name==name)

let rate=c.type=="D"?getRateD():getRateP()

let amt=total*rate

let bills=JSON.parse(localStorage.getItem("bills")||"{}")

bills[name]={from:from,to:to,qty:total,amt:amt}

localStorage.setItem("bills",JSON.stringify(bills))

billResult.innerHTML="Bill Amount ₹"+amt

}



function generateAllBills(){

getCustomers().forEach(c=>{

billCustomer.value=c.name

generateBill()

})

}



function loadPayment(){

payCustomer.innerHTML=""

getCustomers().forEach(c=>{

let o=document.createElement("option")

o.value=c.name

o.innerText=c.name

payCustomer.appendChild(o)

})

}



function savePayment(){

let name=payCustomer.value

let amt=parseFloat(recAmt.value)||0

let payments=JSON.parse(localStorage.getItem("payments")||"{}")

payments[name]=(payments[name]||0)+amt

localStorage.setItem("payments",JSON.stringify(payments))

alert("Payment Saved")

recAmt.value=""

}



function loadLedger(){

let type = ledgerType.value
let from = ledgerFrom.value
let to = ledgerTo.value

let customers = getCustomers()
let entries = JSON.parse(localStorage.getItem("entries")||"{}")
let payments = JSON.parse(localStorage.getItem("payments")||"{}")

let html="<table>"
html+="<tr><th>Name</th><th>Milk</th><th>Bill</th><th>Paid</th><th>Balance</th></tr>"

customers.forEach(function(c){

if(type!="ALL" && c.type!=type) return

let total=0

Object.keys(entries).forEach(function(d){

if(d>=from && d<=to){

let day=entries[d]

if(day[c.name] && !day[c.name].c){

total += (day[c.name].m||0) + (day[c.name].e||0)

}

}

})

if(total==0) return

let rate = c.type=="D" ? getRateD() : getRateP()

let bill = total * rate

let paid = payments[c.name] || 0

let bal = bill - paid

html+="<tr>"
html+="<td>"+c.name+"</td>"
html+="<td>"+total+"</td>"
html+="<td>₹"+bill+"</td>"
html+="<td>₹"+paid+"</td>"
html+="<td>₹"+bal+"</td>"
html+="</tr>"

})

html+="</table>"

ledgerResult.innerHTML=html

}

function getRateP(){

return parseFloat(localStorage.getItem("rateP")||90)

}



function getRateD(){

return parseFloat(localStorage.getItem("rateD")||100)

}



function loadRates(){

rateP.value=getRateP()

rateD.value=getRateD()

}



function saveRates(){

localStorage.setItem("rateP",rateP.value)

localStorage.setItem("rateD",rateD.value)

alert("Rates Saved")

}

</script>

</body>

</html>
