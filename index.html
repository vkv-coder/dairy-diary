<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gopal Gaushala</title>

<style>

body{font-family:Arial;margin:0;background:#eef3ff}

.header{
background:#2f6fd1;
color:white;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold
}

.container{
max-width:520px;
margin:auto;
padding:15px
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px
}

.menu button{
padding:16px;
font-size:18px;
background:#2f6fd1;
color:yellow;
border:none;
border-radius:10px
}

.page{display:none}

input,select{
width:100%;
padding:10px;
font-size:16px;
margin-top:6px;
margin-bottom:10px
}

button{
padding:10px;
font-size:15px;
background:#2f6fd1;
color:yellow;
border:none;
border-radius:6px;
margin-top:6px
}

.back{
background:#444;
color:white;
width:100%
}

.row{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:6px;
background:white;
padding:8px;
margin-bottom:6px;
border-radius:6px
}

.customerRow{
display:flex;
justify-content:space-between;
background:white;
padding:8px;
margin-bottom:6px
}

table{
width:100%;
border-collapse:collapse;
background:white
}

th,td{
padding:8px;
border-bottom:1px solid #ccc
}

</style>
</head>

<body>

<div class="header">🐄 GOPAL GAUSHALA</div>

<div class="container">

<div id="home" class="page" style="display:block">

<div class="menu">

<button onclick="show('entry')">TODAY ENTRY</button>
<button onclick="show('master')">CUSTOMERS</button>
<button onclick="show('billing')">BILLING</button>
<button onclick="show('payment')">PAYMENT</button>
<button onclick="show('ledger')">LEDGER</button>
<button onclick="show('settings')">SETTINGS</button>

</div>

</div>


<!-- CUSTOMER MASTER -->

<div id="master" class="page">

<h3>Customer Master</h3>

<input id="cname" placeholder="Customer Name">

<select id="ctype">
<option value="P">Pickup</option>
<option value="D">Delivery</option>
</select>

<button onclick="saveCustomer()">SAVE CUSTOMER</button>

<div id="custList"></div>

<button class="back" onclick="show('home')">BACK</button>

</div>


<!-- ENTRY -->

<div id="entry" class="page">

<h3>Daily Entry</h3>

<input type="date" id="entryDate">

<select id="entryType">
<option value="P">Pickup</option>
<option value="D">Delivery</option>
</select>

<label>Entry Mode</label>

<select id="entryShift">
<option value="M">Morning</option>
<option value="E">Evening</option>
<option value="B">Both</option>
</select>

<button onclick="loadEntry()">LOAD ENTRY</button>

<div id="entryList"></div>

<button onclick="saveEntry()">SAVE ENTRY</button>

<button class="back" onclick="show('home')">BACK</button>

</div>


<!-- BILLING -->

<div id="billing" class="page">

<h3>Billing</h3>

<select id="billType">
<option value="ALL">All</option>
<option value="P">Pickup</option>
<option value="D">Delivery</option>
</select>

<select id="billCustomer"></select>

<label>From Date</label>
<input type="date" id="billFrom">

<label>To Date</label>
<input type="date" id="billTo">

<button onclick="generateBill()">GENERATE BILL</button>

<button onclick="generateAllBills()">GENERATE ALL BILLS</button>

<div id="billResult"></div>

<button class="back" onclick="show('home')">BACK</button>

</div>


<!-- PAYMENT -->

<div id="payment" class="page">

<h3>Payment</h3>

<select id="payCustomer" onchange="loadCustomerBill()"></select>

<div id="billInfo"></div>

<input id="recAmt" placeholder="Received Amount">

<button onclick="savePayment()">SAVE PAYMENT</button>

<button class="back" onclick="show('home')">BACK</button>

</div>


<!-- LEDGER -->

<div id="ledger" class="page">

<h3>Ledger</h3>

<select id="ledgerType">
<option value="ALL">All</option>
<option value="P">Pickup</option>
<option value="D">Delivery</option>
</select>

<label>From Date</label>
<input type="date" id="ledgerFrom">

<label>To Date</label>
<input type="date" id="ledgerTo">

<button onclick="loadLedger()">LOAD LEDGER</button>

<div id="ledgerResult"></div>

<button class="back" onclick="show('home')">BACK</button>

</div>


<!-- SETTINGS -->

<div id="settings" class="page">

<h3>Rates</h3>

<input id="rateP" placeholder="Pickup Rate">

<input id="rateD" placeholder="Delivery Rate">

<button onclick="saveRates()">SAVE RATES</button>

<h3>Backup</h3>

<button onclick="backupData()">BACKUP DATA</button>

<button class="back" onclick="show('home')">BACK</button>

</div>

</div>


<script>

function show(p){

document.querySelectorAll(".page").forEach(x=>x.style.display="none")

document.getElementById(p).style.display="block"

if(p=="master")loadCustomers()
if(p=="billing")loadBilling()
if(p=="payment")loadPayment()

}


function getCustomers(){

return JSON.parse(localStorage.getItem("customers")||"[]")

}


function saveCustomer(){

let c=getCustomers()

c.push({

name:cname.value,
type:ctype.value

})

localStorage.setItem("customers",JSON.stringify(c))

cname.value=""

loadCustomers()

}


function loadCustomers(){

custList.innerHTML=""

getCustomers().forEach((c,i)=>{

let d=document.createElement("div")

d.className="customerRow"

d.innerHTML=
c.name+" ("+(c.type=="D"?"Delivery":"Pickup")+") "+
"<span>"+
"<button onclick='editCustomer("+i+")'>Edit</button>"+
"<button onclick='deleteCustomer("+i+")'>Delete</button>"+
"</span>"

custList.appendChild(d)

})

}


function deleteCustomer(i){

let c=getCustomers()

c.splice(i,1)

localStorage.setItem("customers",JSON.stringify(c))

loadCustomers()

}


function editCustomer(i){

let c=getCustomers()[i]

cname.value=c.name

ctype.value=c.type

deleteCustomer(i)

}


function loadEntry(){

entryList.innerHTML=""

let customers=getCustomers()

customers.forEach(c=>{

if(c.type!=entryType.value)return

let r=document.createElement("div")

r.className="row"

r.dataset.name=c.name

let name=document.createElement("div")

name.innerText=c.name

let m=document.createElement("input")

m.type="number"

let e=document.createElement("input")

e.type="number"

r.append(name,m,e)

entryList.appendChild(r)

})

}


function saveEntry(){

let date=entryDate.value

let rows=document.querySelectorAll("#entryList .row")

let data=JSON.parse(localStorage.getItem("entries")||"{}")

let shift=entryShift.value

if(!data[date])data[date]={}

rows.forEach(r=>{

let name=r.dataset.name

let inputs=r.querySelectorAll("input")

let m=parseFloat(inputs[0].value)||0

let e=parseFloat(inputs[1].value)||0

if(!data[date][name]){

data[date][name]={m:0,e:0}

}

if(shift=="M")data[date][name].m=m

if(shift=="E")data[date][name].e=e

if(shift=="B"){

data[date][name].m=m

data[date][name].e=e

}

})

localStorage.setItem("entries",JSON.stringify(data))

alert("Entry Saved")

}


function loadBilling(){

billCustomer.innerHTML=""

getCustomers().forEach(c=>{

let o=document.createElement("option")

o.value=c.name

o.innerText=c.name

billCustomer.appendChild(o)

})

}


function generateBill(){

let name=billCustomer.value

let from=billFrom.value

let to=billTo.value

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let total=0

Object.keys(entries).forEach(d=>{

if(d>=from && d<=to){

let day=entries[d]

if(day[name]){

total+=day[name].m+day[name].e

}

}

})

let c=getCustomers().find(x=>x.name==name)

let rate=c.type=="D"?getRateD():getRateP()

let amt=total*rate

let bills=JSON.parse(localStorage.getItem("bills")||"{}")

bills[name]={from:from,to:to,qty:total,amt:amt}

localStorage.setItem("bills",JSON.stringify(bills))

billResult.innerHTML="Bill Amount ₹"+amt

}


function generateAllBills(){

getCustomers().forEach(c=>{

billCustomer.value=c.name

generateBill()

})

}


function loadPayment(){

payCustomer.innerHTML=""

getCustomers().forEach(c=>{

let o=document.createElement("option")

o.value=c.name

o.innerText=c.name

payCustomer.appendChild(o)

})

}


function loadCustomerBill(){

let name=payCustomer.value

let bills=JSON.parse(localStorage.getItem("bills")||"{}")

let payments=JSON.parse(localStorage.getItem("payments")||"{}")

let b=bills[name]

if(!b){

billInfo.innerHTML="No bill generated"

return

}

let paid=payments[name]||0

let bal=b.amt-paid

billInfo.innerHTML=

"Bill Period : "+b.from+" → "+b.to+
"<br>Bill Amount : ₹"+b.amt+
"<br>Paid : ₹"+paid+
"<br><b>Balance : ₹"+bal+"</b>"

}


function savePayment(){

let name=payCustomer.value

let amt=parseFloat(recAmt.value)||0

let payments=JSON.parse(localStorage.getItem("payments")||"{}")

payments[name]=(payments[name]||0)+amt

localStorage.setItem("payments",JSON.stringify(payments))

alert("Payment Saved")

recAmt.value=""

}


function loadLedger(){

let type=ledgerType.value

let from=ledgerFrom.value

let to=ledgerTo.value

let customers=getCustomers()

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let payments=JSON.parse(localStorage.getItem("payments")||"{}")

let html="<table>"

html+="<tr><th>Name</th><th>Milk</th><th>Bill</th><th>Paid</th><th>Balance</th></tr>"

customers.forEach(c=>{

if(type!="ALL" && c.type!=type)return

let total=0

Object.keys(entries).forEach(d=>{

if(d>=from && d<=to){

let day=entries[d]

if(day[c.name]){

total+=day[c.name].m+day[c.name].e

}

}

})

if(total==0)return

let rate=c.type=="D"?getRateD():getRateP()

let bill=total*rate

let paid=payments[c.name]||0

let bal=bill-paid

html+="<tr>"
html+="<td>"+c.name+"</td>"
html+="<td>"+total+"</td>"
html+="<td>₹"+bill+"</td>"
html+="<td>₹"+paid+"</td>"
html+="<td>₹"+bal+"</td>"
html+="</tr>"

})

html+="</table>"

ledgerResult.innerHTML=html

}


function getRateP(){

return parseFloat(localStorage.getItem("rateP")||90)

}


function getRateD(){

return parseFloat(localStorage.getItem("rateD")||100)

}


function loadRates(){

rateP.value=getRateP()

rateD.value=getRateD()

}


function saveRates(){

localStorage.setItem("rateP",rateP.value)

localStorage.setItem("rateD",rateD.value)

alert("Rates Saved")

}


function backupData(){

let data={

customers:localStorage.getItem("customers"),
entries:localStorage.getItem("entries"),
bills:localStorage.getItem("bills"),
payments:localStorage.getItem("payments"),
rateP:localStorage.getItem("rateP"),
rateD:localStorage.getItem("rateD")

}

let file=new Blob([JSON.stringify(data)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(file)

a.download="gaushala_backup.json"

a.click()

}

</script>

</body>
</html>
