<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gopal Gaushala</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef3ff;
font-size:18px;
}

.header{
background:#2f6fd1;
color:white;
text-align:center;
padding:18px;
font-size:26px;
font-weight:bold;
}

.container{
padding:12px;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.box{
background:#2f6fd1;
color:yellow;
padding:20px;
text-align:center;
border-radius:8px;
font-size:20px;
}

button{
background:#2f6fd1;
color:yellow;
border:none;
padding:12px;
font-size:18px;
border-radius:8px;
margin-top:8px;
width:100%;
}

.backbtn{
background:#444;
color:white;
}

.row{
background:white;
padding:10px;
border-radius:8px;
margin-bottom:8px;
}

.smallbtn{
width:auto;
padding:6px 10px;
font-size:14px;
}

.qtybtn{
width:34px;
height:34px;
font-size:18px;
}

.cancelled{
background:#ffd6d6;
}

.hidden{
display:none;
}

input,select{
width:100%;
padding:10px;
font-size:16px;
margin-bottom:8px;
}

</style>
</head>

<body>

<div class="header">🐄 GOPAL GAUSHALA</div>

<div class="container">

<!-- HOME -->

<div id="home">

<div class="menu">

<div class="box" onclick="show('entry')">TODAY ENTRY</div>
<div class="box" onclick="show('master')">CUSTOMER MASTER</div>
<div class="box" onclick="show('billing')">BILLING</div>
<div class="box" onclick="show('payments')">PAYMENTS</div>
<div class="box" onclick="show('settings')">SETTINGS</div>
<div class="box" onclick="backup()">BACKUP</div>

</div>

</div>


<!-- CUSTOMER MASTER -->

<div id="master" class="hidden">

<h3>Add Customer</h3>

<input id="custName" placeholder="Name">

<input id="custPhone" placeholder="Phone">

<select id="custType">
<option value="P">Pickup</option>
<option value="D">Delivery</option>
</select>

<input id="custMorning" type="number" step="0.5" placeholder="Std Morning">

<input id="custEvening" type="number" step="0.5" placeholder="Std Evening">

<button onclick="saveCustomer()">SAVE</button>

<button class="backbtn" onclick="show('home')">BACK</button>

</div>


<!-- ENTRY -->

<div id="entry" class="hidden">

<h3>Daily Entry</h3>

<input type="date" id="entryDate">

<div id="entryList"></div>

<button onclick="addExtra()">+ ADD CUSTOMER FOR TODAY</button>

<button onclick="saveEntry()">SAVE ENTRY</button>

<button class="backbtn" onclick="show('home')">BACK</button>
</div>


<!-- BILLING -->

<div id="billing" class="hidden">

<h3>Billing</h3>

<select id="billCustomer"></select>

<button onclick="generateBill()">GENERATE BILL</button>

<div id="billResult"></div>

<button class="backbtn" onclick="show('home')">BACK</button>

</div>


<!-- PAYMENTS -->

<div id="payments" class="hidden">

<h3>Payments</h3>

<select id="payCustomer"></select>

<input placeholder="Bill Amount">

<input placeholder="Received Amount">

<button>SAVE PAYMENT</button>

<button class="backbtn" onclick="show('home')">BACK</button>

</div>


<!-- SETTINGS -->

<div id="settings" class="hidden">

<h3>Rates</h3>

Pickup Rate

<input id="pickupRate">

Delivery Rate

<input id="deliveryRate">

<button onclick="saveRates()">SAVE</button>

<button class="backbtn" onclick="show('home')">BACK</button>

</div>

</div>


<script>

/* navigation */

function show(id){

let pages=["home","master","entry","billing","payments","settings"]

pages.forEach(p=>{
document.getElementById(p).classList.add("hidden")
})

document.getElementById(id).classList.remove("hidden")

if(id=="entry") loadEntry()

if(id=="billing"||id=="payments") loadCustomers()

if(id=="settings") loadRates()

}


/* customer master */

function saveCustomer(){

let customers=JSON.parse(localStorage.getItem("customers")||"[]")

customers.push({
name:custName.value,
phone:custPhone.value,
type:custType.value,
morning:custMorning.value,
evening:custEvening.value
})

localStorage.setItem("customers",JSON.stringify(customers))

custName.value=""
custPhone.value=""
custMorning.value=""
custEvening.value=""

alert("Saved")

}


/* load customers */

function loadCustomers(){

let customers=JSON.parse(localStorage.getItem("customers")||"[]")

let html=""

customers.forEach(c=>{
html+=`<option>${c.name}</option>`
})

billCustomer.innerHTML=html
payCustomer.innerHTML=html

}


/* entry */

function loadEntry(){

entryDate.value=new Date().toISOString().slice(0,10)

let customers=JSON.parse(localStorage.getItem("customers")||"[]")

entryList.innerHTML=""

customers.forEach((c,i)=>{

entryList.innerHTML+=`

<div class="row" id="row${i}">

<b>${c.name} (${c.type})</b>

<button class="smallbtn" onclick="cancel(${i})">Cancel</button>

<br>

M 
<button class="qtybtn" onclick="chg(${i},'m',-1)">-</button>
<span id="m${i}">${c.morning}</span>
<button class="qtybtn" onclick="chg(${i},'m',1)">+</button>

&nbsp;&nbsp;

E 
<button class="qtybtn" onclick="chg(${i},'e',-1)">-</button>
<span id="e${i}">${c.evening}</span>
<button class="qtybtn" onclick="chg(${i},'e',1)">+</button>

</div>

`

})

}


function chg(i,t,v){

let el=document.getElementById(t+i)

let val=parseFloat(el.innerText)+v

if(val<0) val=0

el.innerText=val

}


function cancel(i){

let r=document.getElementById("row"+i)

if(r.classList.contains("cancelled")){
r.classList.remove("cancelled")
}else{
r.classList.add("cancelled")
}

}


/* extra customer */

function addExtra(){

let name=prompt("Customer name")

let qty=prompt("Milk qty")

entryList.innerHTML+=`

<div class="row">

<b>${name} (extra)</b>

<br>

Qty ${qty}

</div>

`

}


/* save entry */

function saveEntry(){

let date = entryDate.value

let rows = document.querySelectorAll("#entryList .row")

let entries = JSON.parse(localStorage.getItem("entries") || "[]")

rows.forEach((r,i)=>{

let name = r.querySelector("b").innerText.split("(")[0].trim()

let morning = r.querySelector("#m"+i)?.innerText || 0
let evening = r.querySelector("#e"+i)?.innerText || 0

let cancelled = r.classList.contains("cancelled")

entries.push({
date:date,
name:name,
morning:parseFloat(morning),
evening:parseFloat(evening),
cancelled:cancelled
})

})

localStorage.setItem("entries",JSON.stringify(entries))

alert("Daily entry saved")

}
  }


/* billing */

function generateBill(){

let name = document.getElementById("billCustomer").value

let entries = JSON.parse(localStorage.getItem("entries") || "[]")

let rateP = parseFloat(localStorage.getItem("rateP") || 90)
let rateD = parseFloat(localStorage.getItem("rateD") || 100)

let customers = JSON.parse(localStorage.getItem("customers") || "[]")

let cust = customers.find(c=>c.name===name)

let rate = cust.type==="D" ? rateD : rateP

let totalMilk = 0

entries.forEach(e=>{
 if(e.name===name && !e.cancelled){
   totalMilk += (e.morning + e.evening)
 }
})

let amount = totalMilk * rate

document.getElementById("billResult").innerHTML =
`
Milk : ${totalMilk} L<br><br>
Rate : ₹${rate}<br><br>
Total : ₹${amount}
`

window.currentBill = {
name:name,
milk:totalMilk,
rate:rate,
amount:amount
}

function sendWA(msg){

let url="https://wa.me/?text="+encodeURIComponent(msg)

window.open(url)

}


/* settings */

function saveRates(){

let r={
pickup:pickupRate.value,
delivery:deliveryRate.value
}

localStorage.setItem("rates",JSON.stringify(r))

alert("Saved")

}

function loadRates(){

let r=JSON.parse(localStorage.getItem("rates")||"{}")

pickupRate.value=r.pickup||90
deliveryRate.value=r.delivery||100

}


/* backup */

function backup(){

let data=localStorage

let blob=new Blob([JSON.stringify(data)])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="gaushala_backup.json"

a.click()

}

</script>

</body>
</html>
