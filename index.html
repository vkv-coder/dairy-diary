<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dairy Milk App</title>

<style>
body{font-family:Arial;margin:0;background:#f5f9ff}
.header{background:#1976d2;color:white;padding:15px;text-align:center;font-size:22px}
.container{padding:10px}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px
}

.box{
background:white;
border-radius:10px;
padding:20px;
text-align:center;
font-size:18px;
border:2px solid #1976d2;
color:#1976d2
}

button{
padding:10px;
margin-top:5px;
width:100%;
font-size:16px;
border:none;
border-radius:6px;
background:#1976d2;
color:white
}

.smallbtn{
width:30px;
padding:4px
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #ddd;
padding:6px;
background:white
}

.qty{display:flex;align-items:center}
.qty span{width:35px;text-align:center}

input,select{
padding:8px;
width:100%;
margin:5px 0
}

.totalbox{
background:white;
padding:10px;
border-radius:8px;
margin-bottom:10px
}
</style>

</head>

<body>

<div class="header">🥛 Dairy Milk</div>

<div class="container" id="home">

<div class="totalbox" id="todayTotals"></div>

<div class="menu">

<div class="box" onclick="show('entry')">TODAY ENTRY</div>
<div class="box" onclick="show('master')">CUSTOMER MASTER</div>
<div class="box" onclick="show('billing')">BILLING</div>
<div class="box" onclick="backup()">BACKUP</div>

</div>

</div>


<div class="container" id="master" style="display:none">

<h3>Add Customer</h3>

<input id="name" placeholder="Customer Name">

Morning Qty
<input id="mqty" type="number" step="0.5" value="1">

Evening Qty
<input id="eqty" type="number" step="0.5" value="0">

<label>
<input type="checkbox" id="stop"> Temp Stop Delivery
</label>

<button onclick="addCustomer()">SAVE</button>
<button onclick="show('home')">BACK</button>

<div id="custList"></div>

</div>



<div class="container" id="entry" style="display:none">

<h3>Daily Entry</h3>

Entry Date
<input type="date" id="entryDate">

<div class="row">
<b>Customer</b>
<b>M</b>
<b>Paid</b>
<b>E</b>
<b>Paid</b>
</div>

<div id="entryList"></div>

<button onclick="saveEntry()">SAVE ENTRY</button>
<button onclick="show('home')">BACK</button>

</div>



<div class="container" id="billing" style="display:none">

<h3>Billing</h3>

Customer
<select id="billCustomer"></select>

<button onclick="viewLedger()">VIEW LEDGER</button>

<div id="ledger"></div>

<button onclick="generateBill()">GENERATE BILL</button>

<div id="billResult"></div>

<button onclick="generateAll()">GENERATE ALL BILLS</button>

<button onclick="show('home')">BACK</button>

</div>


<script>

function show(id){

['home','master','entry','billing'].forEach(x=>{
document.getElementById(x).style.display='none'
})

document.getElementById(id).style.display='block'

if(id=="master")loadCustomers()
if(id=="entry")loadEntry()
if(id=="billing")loadCustomerDropdown()
if(id=="home")loadDashboard()

}


function getCustomers(){
return JSON.parse(localStorage.getItem("customers")||"[]")
}


function addCustomer(){

let customers=getCustomers()

customers.push({
name:document.getElementById("name").value,
mqty:parseFloat(document.getElementById("mqty").value),
eqty:parseFloat(document.getElementById("eqty").value),
stop:document.getElementById("stop").checked
})

localStorage.setItem("customers",JSON.stringify(customers))

alert("Saved")

loadCustomers()

}


function loadCustomers(){

let customers=getCustomers()

let html=""

customers.forEach(c=>{
html+=`<div class=row>${c.name}</div>`
})

document.getElementById("custList").innerHTML=html

}



function loadEntry(){

let customers=getCustomers()

let html=""

customers.forEach((c,i)=>{

if(c.stop)return

html+=`

<div class="row">

<div>${c.name}</div>

<div class="qty">
<button class="smallbtn" onclick="chg(${i},'m',-0.5)">-</button>
<span id="m${i}">${c.mqty}</span>
<button class="smallbtn" onclick="chg(${i},'m',0.5)">+</button>
</div>

<button onclick="paid(${i},'mp')">✓</button>

<div class="qty">
<button class="smallbtn" onclick="chg(${i},'e',-0.5)">-</button>
<span id="e${i}">${c.eqty}</span>
<button class="smallbtn" onclick="chg(${i},'e',0.5)">+</button>
</div>

<button onclick="paid(${i},'ep')">✓</button>

</div>

`
})

document.getElementById("entryList").innerHTML=html

}


function chg(i,type,val){

let el=document.getElementById(type+i)

let v=parseFloat(el.innerText)+val

if(v<0)v=0

el.innerText=v

}



function paid(i,type){

alert("Payment marked")

}



function saveEntry(){

let date=document.getElementById("entryDate").value

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let customers=getCustomers()

entries[date]=[]

customers.forEach((c,i)=>{

let m=document.getElementById("m"+i)
let e=document.getElementById("e"+i)

if(!m)return

entries[date].push({
name:c.name,
mqty:parseFloat(m.innerText),
eqty:parseFloat(e.innerText)
})

})

localStorage.setItem("entries",JSON.stringify(entries))

alert("Saved")

loadDashboard()

}



function loadDashboard(){

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let today=new Date().toISOString().slice(0,10)

let mt=0
let et=0

if(entries[today]){

entries[today].forEach(e=>{
mt+=e.mqty
et+=e.eqty
})

}

let rate=localStorage.getItem("milkRate")||70

let total=(mt+et)*rate

document.getElementById("todayTotals").innerHTML=

"Morning : "+mt+" L<br>"+
"Evening : "+et+" L<br>"+
"Total Milk : "+(mt+et)+" L<br>"+
"Amount : ₹"+total

}



function loadCustomerDropdown(){

let customers=getCustomers()

let html=""

customers.forEach(c=>{
html+=`<option>${c.name}</option>`
})

document.getElementById("billCustomer").innerHTML=html

}



function viewLedger(){

let name=document.getElementById("billCustomer").value

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let html=""

Object.keys(entries).forEach(d=>{

entries[d].forEach(e=>{

if(e.name==name){

html+=d+" - "+(e.mqty+e.eqty)+" L<br>"

}

})

})

document.getElementById("ledger").innerHTML=html

}



function generateBill(){

let name=document.getElementById("billCustomer").value

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let total=0

Object.keys(entries).forEach(d=>{

entries[d].forEach(e=>{

if(e.name==name){
total+=e.mqty+e.eqty
}

})

})

let rate=localStorage.getItem("milkRate")||70

let amount=total*rate

document.getElementById("billResult").innerHTML=

"Milk : "+total+" L<br>"+
"Rate : ₹"+rate+"<br>"+
"Amount : ₹"+amount

}



function generateAll(){

let customers=getCustomers()

let result=""

customers.forEach(c=>{
result+=c.name+" bill generated<br>"
})

document.getElementById("billResult").innerHTML=result

}



function backup(){

let data={
customers:getCustomers(),
entries:JSON.parse(localStorage.getItem("entries")||"{}")
}

let blob=new Blob([JSON.stringify(data)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="milk_backup.json"

a.click()

}

loadDashboard()

</script>

</body>
</html>
