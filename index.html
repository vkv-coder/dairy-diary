<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gopal Gaushala</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef3ff;
}

.header{
background:#3a6fd8;
color:white;
padding:12px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.page{
display:none;
padding:15px;
max-width:500px;
margin:auto;
}

button{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:6px;
background:#3a6fd8;
color:white;
font-weight:bold;
}

.back{
background:#444;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border-radius:5px;
border:1px solid #ccc;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px;
background:white;
margin:4px 0;
border-radius:6px;
}

.row input{
width:60px;
}

.cancel{
background:red;
width:30px;
}

.table{
background:white;
padding:10px;
border-radius:6px;
}

.tableRow{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr 1fr;
padding:4px 0;
border-bottom:1px solid #eee;
}

.tableHeader{
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">🐄 GOPAL GAUSHALA</div>

<div class="page" id="home" style="display:block">

<button onclick="show('entry')">📒 TODAY ENTRY</button>
<button onclick="show('master')">👥 CUSTOMERS</button>
<button onclick="show('billing')">🧾 BILLING</button>
<button onclick="show('payment')">💰 PAYMENT</button>
<button onclick="show('ledger')">📊 LEDGER</button>
<button onclick="show('settings')">⚙ SETTINGS</button>

</div>

<!-- CUSTOMER -->

<div id="master" class="page">

<h3>Customer Master</h3>

<input id="cName" placeholder="Customer Name">
<input id="cPhone1" placeholder="Phone 1">
<input id="cPhone2" placeholder="Phone 2">

<select id="cType">
<option>Pickup</option>
<option>Delivery</option>
</select>

<input id="cMorning" placeholder="Std Morning Qty">
<input id="cEvening" placeholder="Std Evening Qty">

<button onclick="saveCustomer()">SAVE CUSTOMER</button>

<div id="customerList"></div>

<button class="back" onclick="show('home')">BACK</button>

</div>

<!-- ENTRY -->

<div id="entry" class="page">

<h3>Daily Entry</h3>

<input type="date" id="entryDate">

<select id="entryType">
<option>Pickup</option>
<option>Delivery</option>
</select>

<select id="entrySession">
<option>Morning</option>
<option>Evening</option>
</select>

<button onclick="loadEntry()">LOAD ENTRY</button>

<div id="entryList"></div>

<button onclick="saveEntry()">SAVE ENTRY</button>

<button class="back" onclick="show('home')">BACK</button>

</div>

<!-- BILLING -->

<div id="billing" class="page">

<h3>Billing</h3>

<select id="billType">
<option>Pickup</option>
<option>Delivery</option>
</select>

<input type="date" id="billFrom">
<input type="date" id="billTo">

<button onclick="generateAllBills()">GENERATE ALL BILLS</button>

<div id="billResult"></div>

<button class="back" onclick="show('home')">BACK</button>

</div>

<!-- PAYMENT -->

<div id="payment" class="page">

<h3>Payment</h3>

<select id="payCustomer"></select>

<div id="payInfo"></div>

<input id="payAmount" placeholder="Received Amount">

<button onclick="savePayment()">SAVE PAYMENT</button>

<button class="back" onclick="show('home')">BACK</button>

</div>

<!-- LEDGER -->

<div id="ledger" class="page">

<h3>Ledger</h3>

<select id="ledgerType">
<option>Pickup</option>
<option>Delivery</option>
</select>

<input type="date" id="ledgerFrom">
<input type="date" id="ledgerTo">

<button onclick="loadLedger()">LOAD</button>

<div class="table">

<div class="tableRow tableHeader">
<div>Name</div>
<div>Milk</div>
<div>Bill</div>
<div>Paid</div>
<div>Bal</div>
</div>

<div id="ledgerResult"></div>

</div>

<button class="back" onclick="show('home')">BACK</button>

</div>

<!-- SETTINGS -->

<div id="settings" class="page">

<h3>Rates</h3>

<input id="ratePickup" placeholder="Pickup Rate">
<input id="rateDelivery" placeholder="Delivery Rate">

<button onclick="saveRates()">SAVE</button>

<button class="back" onclick="show('home')">BACK</button>

</div>

<script>

function show(p){

document.querySelectorAll(".page").forEach(x=>x.style.display="none")

document.getElementById(p).style.display="block"

if(p=="master")loadCustomers()
if(p=="payment")loadPayCustomers()

}

function getCustomers(){
return JSON.parse(localStorage.getItem("customers")||"[]")
}

function saveCustomers(c){
localStorage.setItem("customers",JSON.stringify(c))
}

function saveCustomer(){

let customers=getCustomers()

customers.push({
name:cName.value,
p1:cPhone1.value,
p2:cPhone2.value,
type:cType.value,
m:cMorning.value,
e:cEvening.value
})

saveCustomers(customers)

loadCustomers()

}

function loadCustomers(){

let customers=getCustomers()

let html=""

customers.forEach((c,i)=>{

html+=`
<div class="row">
${c.name} (${c.type})
<button onclick="editCustomer(${i})">Edit</button>
<button onclick="deleteCustomer(${i})">Delete</button>
</div>
`

})

customerList.innerHTML=html

}

function deleteCustomer(i){

let customers=getCustomers()

customers.splice(i,1)

saveCustomers(customers)

loadCustomers()

}

function editCustomer(i){

let c=getCustomers()[i]

cName.value=c.name
cPhone1.value=c.p1
cPhone2.value=c.p2
cType.value=c.type
cMorning.value=c.m
cEvening.value=c.e

deleteCustomer(i)

}

function loadEntry(){

let customers=getCustomers()

let type=entryType.value

let html=""

customers.filter(c=>c.type==type).forEach(c=>{

html+=`
<div class="row">

<div>${c.name}</div>

<input class="qty" data-name="${c.name}">

<button class="cancel">X</button>

</div>
`

})

entryList.innerHTML=html

}

function saveEntry(){

let date=entryDate.value

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

if(!entries[date])entries[date]={}

document.querySelectorAll(".qty").forEach(q=>{

let name=q.dataset.name

entries[date][name]={
m:entrySession.value=="Morning"?Number(q.value||0):0,
e:entrySession.value=="Evening"?Number(q.value||0):0
}

})

localStorage.setItem("entries",JSON.stringify(entries))

alert("Entry Saved")

}

function generateAllBills(){

let customers=getCustomers()

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let from=new Date(billFrom.value)

let to=new Date(billTo.value)

let html=""

customers.filter(c=>c.type==billType.value).forEach(c=>{

let total=0

Object.keys(entries).forEach(d=>{

let dt=new Date(d)

if(dt>=from && dt<=to){

let day=entries[d]

if(day[c.name]){

total+=Number(day[c.name].m||0)+Number(day[c.name].e||0)

}

}

})

if(total>0){

let rate=c.type=="Pickup"?Number(ratePickup.value||0):Number(rateDelivery.value||0)

let bill=total*rate

html+=`${c.name} | ${total} | ₹${bill}<br>`

localStorage.setItem("bill_"+c.name,bill)

}

})

billResult.innerHTML=html

}

function loadPayCustomers(){

let customers=getCustomers()

let html=""

customers.forEach(c=>{

html+=`<option>${c.name}</option>`

})

payCustomer.innerHTML=html

}

function savePayment(){

let name=payCustomer.value

let amt=Number(payAmount.value||0)

let payments=JSON.parse(localStorage.getItem("payments")||"{}")

payments[name]=(payments[name]||0)+amt

localStorage.setItem("payments",JSON.stringify(payments))

alert("Payment Saved")

}

function loadLedger(){

let customers=getCustomers()

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let payments=JSON.parse(localStorage.getItem("payments")||"{}")

let from=new Date(ledgerFrom.value)

let to=new Date(ledgerTo.value)

let html=""

customers.filter(c=>c.type==ledgerType.value).forEach(c=>{

let total=0

Object.keys(entries).forEach(d=>{

let dt=new Date(d)

if(dt>=from && dt<=to){

let day=entries[d]

if(day[c.name]){

total+=Number(day[c.name].m||0)+Number(day[c.name].e||0)

}

}

})

if(total>0){

let rate=c.type=="Pickup"?Number(ratePickup.value||0):Number(rateDelivery.value||0)

let bill=total*rate

let paid=payments[c.name]||0

let bal=bill-paid

html+=`
<div class="tableRow">
<div>${c.name}</div>
<div>${total}</div>
<div>₹${bill}</div>
<div>₹${paid}</div>
<div>₹${bal}</div>
</div>
`

}

})

ledgerResult.innerHTML=html

}

function saveRates(){

localStorage.setItem("ratePickup",ratePickup.value)
localStorage.setItem("rateDelivery",rateDelivery.value)

alert("Rates Saved")

}

ratePickup.value=localStorage.getItem("ratePickup")||90
rateDelivery.value=localStorage.getItem("rateDelivery")||100

</script>

</body>
</html>
