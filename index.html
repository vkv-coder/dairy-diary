```html
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gopal Gaushala</title>

<style>

body{font-family:Arial;margin:0;background:#eef3ff}

.header{
background:#2f6fd1;
color:white;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold
}

.container{
max-width:520px;
margin:auto;
padding:15px
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px
}

.menu button{
padding:16px;
font-size:18px;
background:#2f6fd1;
color:yellow;
border:none;
border-radius:10px
}

.page{display:none}

input,select{
width:100%;
padding:10px;
font-size:16px;
margin-top:6px;
margin-bottom:10px
}

button{
padding:10px;
font-size:15px;
background:#2f6fd1;
color:yellow;
border:none;
border-radius:6px;
margin-top:6px
}

.back{
background:#444;
color:white;
width:100%;
}

.row{
display:grid;
grid-template-columns:2fr 1fr 1fr 40px;
gap:6px;
background:white;
padding:8px;
margin-bottom:6px;
border-radius:8px
}

.head{
display:grid;
grid-template-columns:2fr 1fr 1fr 40px;
font-weight:bold;
margin-bottom:5px
}

.cancel{
background:red;
color:white;
border:none;
border-radius:6px
}

.cancelled{
opacity:0.4;
background:#ffe6e6;
}

.customerRow{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:8px;
margin-bottom:6px;
border-radius:8px
}

.customerRow button{
width:auto;
margin-left:6px
}

</style>

</head>

<body>

<div class="header">🐄 GOPAL GAUSHALA</div>

<div class="container">

<div id="home" class="page" style="display:block">

<div class="menu">

<button onclick="show('entry')">TODAY ENTRY</button>
<button onclick="show('master')">CUSTOMERS</button>
<button onclick="show('billing')">BILLING</button>
<button onclick="show('payment')">PAYMENT</button>
<button onclick="show('ledger')">LEDGER</button>
<button onclick="show('settings')">SETTINGS</button>

</div>

</div>

<!-- CUSTOMER MASTER -->

<div id="master" class="page">

<h3>Customer Master</h3>

<input id="cname" placeholder="Customer Name">
<input id="phone1" placeholder="Phone 1">
<input id="phone2" placeholder="Phone 2">

<select id="ctype">
<option value="P">Pickup</option>
<option value="D">Delivery</option>
</select>

<input id="stdM" placeholder="Std Morning Qty">
<input id="stdE" placeholder="Std Evening Qty">

<button onclick="saveCustomer()">SAVE CUSTOMER</button>

<div id="custList"></div>

<button class="back" onclick="show('home')">BACK</button>

</div>

<!-- DAILY ENTRY -->

<div id="entry" class="page">

<h3>Daily Entry</h3>

<input type="date" id="entryDate">

<select id="entryType">
<option value="D">Delivery</option>
<option value="P">Pickup</option>
</select>

<button onclick="loadEntry()">LOAD ENTRY</button>

<div class="head">
<div>Customer</div>
<div>Morning</div>
<div>Evening</div>
<div></div>
</div>

<div id="entryList"></div>

<button onclick="saveEntry()">SAVE ENTRY</button>

<button class="back" onclick="show('home')">BACK</button>

</div>

<!-- BILLING -->

<div id="billing" class="page">
<h3>Billing</h3>
<p>Billing page</p>
<button class="back" onclick="show('home')">BACK</button>
</div>

<!-- PAYMENT -->

<div id="payment" class="page">
<h3>Payment</h3>
<p>Payment page</p>
<button class="back" onclick="show('home')">BACK</button>
</div>

<!-- LEDGER -->

<div id="ledger" class="page">
<h3>Ledger</h3>
<p>Ledger page</p>
<button class="back" onclick="show('home')">BACK</button>
</div>

<!-- SETTINGS -->

<div id="settings" class="page">
<h3>Settings</h3>
<p>Settings page</p>
<button class="back" onclick="show('home')">BACK</button>
</div>

</div>

<script>

function show(p){

document.querySelectorAll(".page").forEach(x=>x.style.display="none")

let page = document.getElementById(p)

if(page){
page.style.display="block"
}

function getCustomers(){
return JSON.parse(localStorage.getItem("customers")||"[]")
}

function saveCustomers(c){
localStorage.setItem("customers",JSON.stringify(c))
}

function saveCustomer(){

let c=getCustomers()

c.push({
name:cname.value,
p1:phone1.value,
p2:phone2.value,
type:ctype.value,
m:parseFloat(stdM.value)||0,
e:parseFloat(stdE.value)||0
})

saveCustomers(c)

cname.value=""
phone1.value=""
phone2.value=""
stdM.value=""
stdE.value=""

loadCustomers()

}

function loadCustomers(){

custList.innerHTML=""

let customers=getCustomers()

customers.forEach((c,i)=>{

let d=document.createElement("div")
d.className="customerRow"

d.innerHTML=
"<span>"+c.name+" ("+(c.type=="D"?"Delivery":"Pickup")+")</span>"+
"<span>"+
"<button onclick='editCustomer("+i+")'>Edit</button>"+
"<button style='background:red;color:white' onclick='deleteCustomer("+i+")'>Delete</button>"+
"</span>"

custList.appendChild(d)

})

}

function deleteCustomer(i){

let customers=getCustomers()

customers.splice(i,1)

saveCustomers(customers)

loadCustomers()

}

function editCustomer(i){

let c=getCustomers()[i]

cname.value=c.name
phone1.value=c.p1
phone2.value=c.p2
ctype.value=c.type
stdM.value=c.m
stdE.value=c.e

deleteCustomer(i)

}

function loadEntry(){

entryList.innerHTML=""

let customers=getCustomers()

customers.forEach(c=>{

if(c.type!=entryType.value)return

let r=document.createElement("div")

r.className="row"

r.dataset.name=c.name

let cname=document.createElement("div")
cname.innerText=c.name

let mInput=document.createElement("input")
mInput.type="number"
mInput.step="0.5"
mInput.value=c.m

let eInput=document.createElement("input")
eInput.type="number"
eInput.step="0.5"
eInput.value=c.e

let cancel=document.createElement("button")
cancel.type="button"
cancel.className="cancel"
cancel.innerText="X"
cancel.onclick=()=>r.classList.toggle("cancelled")

r.append(cname,mInput,eInput,cancel)

entryList.appendChild(r)

})

}

function saveEntry(){

let date=entryDate.value

let rows=document.querySelectorAll("#entryList .row")

let data=JSON.parse(localStorage.getItem("entries")||"{}")

if(!data[date])data[date]={}

rows.forEach(r=>{

let name=r.dataset.name

let inputs=r.querySelectorAll("input")

data[date][name]={

m:parseFloat(inputs[0].value)||0,
e:parseFloat(inputs[1].value)||0,
c:r.classList.contains("cancelled")

}

})

localStorage.setItem("entries",JSON.stringify(data))

alert("Entry Saved")

show("home")

}

</script>

</body>
</html>
