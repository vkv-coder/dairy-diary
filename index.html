```html
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gopal Gaushala</title>

<style>

body{font-family:Arial;margin:0;background:#eef3ff}

.header{
background:#2f6fd1;
color:white;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold
}

.container{
max-width:520px;
margin:auto;
padding:15px
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px
}

.menu button{
padding:16px;
font-size:18px;
background:#2f6fd1;
color:yellow;
border:none;
border-radius:10px
}

.page{display:none}

input,select{
width:100%;
padding:10px;
font-size:16px;
margin-top:6px;
margin-bottom:10px
}

button{
padding:10px;
font-size:15px;
background:#2f6fd1;
color:yellow;
border:none;
border-radius:6px;
margin-top:6px
}

.back{
background:#444;
color:white;
width:100%;
}

.row{
display:grid;
grid-template-columns:2fr 1fr 1fr 40px;
gap:6px;
background:white;
padding:8px;
margin-bottom:6px;
border-radius:8px
}

.head{
display:grid;
grid-template-columns:2fr 1fr 1fr 40px;
font-weight:bold;
margin-bottom:5px
}

.customerRow{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:8px;
margin-bottom:6px;
border-radius:8px
}

.customerRow button{
width:auto;
margin-left:6px
}

.ledgerHead{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr 1fr;
font-weight:bold;
background:#ddd;
padding:6px;
margin-bottom:4px
}

.ledgerRow{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr 1fr;
background:white;
padding:6px;
margin-bottom:3px;
border-radius:6px;
font-size:14px
}

.cancel{
background:red;
color:white;
border:none;
border-radius:6px
}

.cancelled{
opacity:0.4;
background:#ffe6e6;
}

</style>

</head>

<body>

<div class="header">🐄 GOPAL GAUSHALA</div>

<div class="container">

<div id="home" class="page" style="display:block">

<div class="menu">

<button onclick="show('entry')">📒 TODAY ENTRY</button>
<button onclick="show('master')">👥 CUSTOMERS</button>
<button onclick="show('billing')">🧾 BILLING</button>
<button onclick="show('payment')">💰 PAYMENT</button>
<button onclick="show('ledger')">📊 LEDGER</button>
<button onclick="show('settings')">⚙ SETTINGS</button>

</div>

</div>

<!-- CUSTOMER MASTER -->

<div id="master" class="page">

<h3>Customer Master</h3>

<input id="cname" placeholder="Customer Name">
<input id="phone1" placeholder="Phone 1">
<input id="phone2" placeholder="Phone 2">

<select id="ctype">
<option value="P">Pickup</option>
<option value="D">Delivery</option>
</select>

<input id="stdM" placeholder="Std Morning Qty">
<input id="stdE" placeholder="Std Evening Qty">

<button onclick="saveCustomer()">SAVE CUSTOMER</button>

<div id="custList"></div>

<button class="back" onclick="show('home')">BACK</button>

</div>

<!-- DAILY ENTRY -->

<div id="entry" class="page">

<h3>Daily Entry</h3>

<input type="date" id="entryDate">

<select id="entryType">
<option value="D">Delivery</option>
<option value="P">Pickup</option>
</select>

<button onclick="loadEntry()">LOAD ENTRY</button>

<div class="head">
<div>Customer</div>
<div>Morning</div>
<div>Evening</div>
<div></div>
</div>

<div id="entryList"></div>

<button onclick="saveEntry()">SAVE ENTRY</button>

<button class="back" onclick="show('home')">BACK</button>

</div>

<!-- BILLING -->

<div id="billing" class="page">

<h3>Billing</h3>

<select id="billCustomer"></select>

<label>From Date</label>
<input type="date" id="billFrom">

<label>To Date</label>
<input type="date" id="billTo">

<button onclick="generateBill()">GENERATE BILL</button>
<button onclick="generateAllBills()">GENERATE ALL BILLS</button>
<button onclick="sendAllWhatsApp()">SEND ALL WHATSAPP</button>

<div id="billResult"></div>

<button onclick="sendWhatsApp()">SEND WHATSAPP</button>

<button class="back" onclick="show('home')">BACK</button>

</div>

<!-- PAYMENT -->

<div id="payment" class="page">

<h3>Payment</h3>

<select id="payCustomer" onchange="loadCustomerBill()"></select>

<div id="billInfo"></div>

<input id="recAmt" placeholder="Received Amount">

<button onclick="savePayment()">SAVE PAYMENT</button>

<button class="back" onclick="show('home')">BACK</button>

</div>

<!-- LEDGER -->

<div id="ledger" class="page">

<h3>Customer Ledger</h3>

<select id="ledgerType" onchange="loadLedgerCustomers()">
<option value="ALL">All Customers</option>
<option value="P">Pickup</option>
<option value="D">Delivery</option>
</select>

<div class="ledgerHead">
<div>Name</div>
<div>Qty</div>
<div>Bill</div>
<div>Paid</div>
<div>Balance</div>
</div>

<div id="ledgerResult"></div>

<button class="back" onclick="show('home')">BACK</button>

</div>

<!-- SETTINGS -->

<div id="settings" class="page">

<h3>Rates</h3>

<input id="rateP" placeholder="Pickup Rate">
<input id="rateD" placeholder="Delivery Rate">

<button onclick="saveRates()">SAVE RATES</button>

<button class="back" onclick="show('home')">BACK</button>

</div>

</div>

<script>

function show(p){

document.querySelectorAll(".page").forEach(x=>x.style.display="none")
document.getElementById(p).style.display="block"

if(p=="entry") entryDate.value=new Date().toISOString().split("T")[0]

if(p=="master")loadCustomers()
if(p=="billing")loadBilling()
if(p=="payment")loadPayment()
if(p=="ledger")loadLedgerCustomers()
if(p=="settings")loadRates()

}

function getCustomers(){
return JSON.parse(localStorage.getItem("customers")||"[]")
}

function saveCustomers(c){
localStorage.setItem("customers",JSON.stringify(c))
}

function saveCustomer(){

let c=getCustomers()

c.push({
name:cname.value,
p1:phone1.value,
p2:phone2.value,
type:ctype.value,
m:parseFloat(stdM.value)||0,
e:parseFloat(stdE.value)||0
})

saveCustomers(c)

cname.value=""
phone1.value=""
phone2.value=""
stdM.value=""
stdE.value=""

loadCustomers()

}

function loadCustomers(){

custList.innerHTML=""

let customers=getCustomers()

customers.forEach((c,i)=>{

let d=document.createElement("div")
d.className="customerRow"

d.innerHTML=
"<span>"+c.name+" ("+(c.type=="D"?"Delivery":"Pickup")+")</span>"+
"<span>"+
"<button onclick='editCustomer("+i+")'>Edit</button>"+
"<button style='background:red;color:white' onclick='deleteCustomer("+i+")'>Delete</button>"+
"</span>"

custList.appendChild(d)

})

}

function deleteCustomer(i){

let c=getCustomers()
c.splice(i,1)
saveCustomers(c)
loadCustomers()

}

function editCustomer(i){

let c=getCustomers()[i]

cname.value=c.name
phone1.value=c.p1
phone2.value=c.p2
ctype.value=c.type
stdM.value=c.m
stdE.value=c.e

deleteCustomer(i)

}

function loadEntry(){

entryList.innerHTML=""

let customers=getCustomers()
let entries=JSON.parse(localStorage.getItem("entries")||"{}")
let date=entryDate.value

customers.filter(c=>c.type==entryType.value).forEach(c=>{

let r=document.createElement("div")
r.className="row"
r.dataset.name=c.name

let m=c.m
let e=c.e

if(entries[date] && entries[date][c.name]){
m=entries[date][c.name].m
e=entries[date][c.name].e
}

let mInput=document.createElement("input")
mInput.type="number"
mInput.step="0.5"
mInput.value=m

let eInput=document.createElement("input")
eInput.type="number"
eInput.step="0.5"
eInput.value=e

let cancel=document.createElement("button")
cancel.className="cancel"
cancel.innerText="X"
cancel.onclick=()=>r.classList.toggle("cancelled")

let cname=document.createElement("div")
cname.innerText=c.name

r.append(cname,mInput,eInput,cancel)

entryList.appendChild(r)

})

}

function saveEntry(){

let date=entryDate.value
let rows=document.querySelectorAll("#entryList .row")

let data=JSON.parse(localStorage.getItem("entries")||"{}")
if(!data[date])data[date]={}

rows.forEach(r=>{

let name=r.dataset.name
let inputs=r.querySelectorAll("input")

data[date][name]={
m:parseFloat(inputs[0].value)||0,
e:parseFloat(inputs[1].value)||0,
c:r.classList.contains("cancelled")
}

})

localStorage.setItem("entries",JSON.stringify(data))

alert("Entry Saved")
show("home")

}

function loadBilling(){

billCustomer.innerHTML=""

getCustomers().forEach(c=>{
let o=document.createElement("option")
o.value=c.name
o.textContent=c.name
billCustomer.appendChild(o)
})

}

function generateBill(){

let name=billCustomer.value
let from=billFrom.value
let to=billTo.value

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let total=0

Object.keys(entries).forEach(d=>{

if(d>=from && d<=to){

let day=entries[d]

if(day[name] && !day[name].c){
total+=day[name].m+day[name].e
}

}

})

let c=getCustomers().find(x=>x.name==name)

let rate=c.type=="D"?getRateD():getRateP()

let amt=total*rate

localStorage.setItem("lastBill_"+name,
JSON.stringify({from:from,to:to,amt:amt}))

billResult.innerHTML=
"Customer : "+name+
"<br>Total Milk : "+total+
"<br>Total : ₹"+amt

}

function generateAllBills(){

let customers=getCustomers()
let from=billFrom.value
let to=billTo.value

let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let output=""

customers.forEach(c=>{

let name=c.name
let total=0

Object.keys(entries).forEach(d=>{

if(d>=from && d<=to){

let day=entries[d]

if(day[name] && !day[name].c){
total+=day[name].m+day[name].e
}

}

})

let rate=c.type=="D"?getRateD():getRateP()

let amt=total*rate

localStorage.setItem("lastBill_"+name,
JSON.stringify({from:from,to:to,amt:amt}))

output+=name+" : "+total+"L → ₹"+amt+"<br>"

})

billResult.innerHTML=output

}

function loadPayment(){

payCustomer.innerHTML=""

getCustomers().forEach(c=>{
let o=document.createElement("option")
o.value=c.name
o.textContent=c.name
payCustomer.appendChild(o)
})

}

function loadCustomerBill(){

let name=payCustomer.value

let bill=JSON.parse(localStorage.getItem("lastBill_"+name)||"{}")

billInfo.innerHTML=
"Bill Period : "+(bill.from||"-")+" → "+(bill.to||"-")+
"<br>Bill Amount : ₹"+(bill.amt||0)

}

function savePayment(){

let name=payCustomer.value
let amt=parseFloat(recAmt.value)||0

let payments=JSON.parse(localStorage.getItem("payments")||"{}")

if(!payments[name])payments[name]=0

payments[name]+=amt

localStorage.setItem("payments",JSON.stringify(payments))

alert("Payment Saved")

recAmt.value=""

}

function loadLedgerCustomers(){

let customers=getCustomers()

let entries=JSON.parse(localStorage.getItem("entries")||"{}")
let payments=JSON.parse(localStorage.getItem("payments")||"{}")

let filter=ledgerType.value

let html=""

customers.forEach(c=>{

if(filter!="ALL" && c.type!=filter)return

let name=c.name
let totalMilk=0

Object.keys(entries).forEach(d=>{

let day=entries[d]

if(day[name] && !day[name].c){
totalMilk+=day[name].m+day[name].e
}

})

let rate=c.type=="D"?getRateD():getRateP()
let bill=totalMilk*rate
let paid=payments[name]||0
let bal=bill-paid

html+="<div class='ledgerRow'>"+
"<div>"+name+"</div>"+
"<div>"+totalMilk+"</div>"+
"<div>"+bill+"</div>"+
"<div>"+paid+"</div>"+
"<div>"+bal+"</div>"+
"</div>"

})

ledgerResult.innerHTML=html

}

function getRateP(){
return parseFloat(localStorage.getItem("rateP")||90)
}

function getRateD(){
return parseFloat(localStorage.getItem("rateD")||100)
}

function loadRates(){

rateP.value=getRateP()
rateD.value=getRateD()

}

function saveRates(){

localStorage.setItem("rateP",rateP.value)
localStorage.setItem("rateD",rateD.value)

alert("Rates Saved")

}

function sendWhatsApp(){

let name=billCustomer.value
let bill=JSON.parse(localStorage.getItem("lastBill_"+name)||"{}")

if(!bill.amt){
alert("Generate bill first")
return
}

let cust=getCustomers().find(c=>c.name==name)
let phone=cust.p1||cust.p2

let msg="Gopal Gaushala\n\nCustomer:"+name+
"\nBill Amount: ₹"+bill.amt

window.open("https://wa.me/91"+phone+"?text="+encodeURIComponent(msg))

}

function sendAllWhatsApp(){

let customers=getCustomers()

customers.forEach(c=>{

let bill=JSON.parse(localStorage.getItem("lastBill_"+c.name)||"{}")

if(!bill.amt)return

let phone=c.p1||c.p2

let msg="Gopal Gaushala\n\nCustomer:"+c.name+
"\nBill Amount: ₹"+bill.amt

window.open("https://wa.me/91"+phone+"?text="+encodeURIComponent(msg))

})

}

</script>

</body>
</html>
