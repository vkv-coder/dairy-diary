<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gopal Gaushala</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef3ff;
}

.header{
background:#2f6fd1;
color:white;
padding:20px;
text-align:center;
font-size:24px;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
padding:20px;
font-size:18px;
background:#2f6fd1;
color:yellow;
border:none;
border-radius:10px;
}

.page{
display:none;
}

</style>

</head>

<body>

<div class="header">🐄 GOPAL GAUSHALA</div>

<div class="container">

<div id="home" class="page">

<div class="menu">

<button onclick="show('entry')">TODAY ENTRY</button>
<button onclick="show('customer')">CUSTOMER MASTER</button>
<button onclick="show('billing')">BILLING</button>
<button onclick="show('payment')">PAYMENTS</button>

</div>

</div>

<div id="entry" class="page">

<h3>Daily Entry</h3>

<button onclick="show('home')">BACK</button>

</div>

<div id="customer" class="page">

<h3>Customer Master</h3>

<button onclick="show('home')">BACK</button>

</div>

<div id="billing" class="page">

<h3>Billing</h3>

<button onclick="show('home')">BACK</button>

</div>

<div id="payment" class="page">

<h3>Payment</h3>

<button onclick="show('home')">BACK</button>

</div>

</div>

<script>

function show(p){

document.querySelectorAll(".page").forEach(function(x){
x.style.display="none"
})

document.getElementById(p).style.display="block"

}

show("home")

</script>

</body>
</html>
