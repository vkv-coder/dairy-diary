<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gopal Gaushala</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef3ff;
font-size:20px;
}

.header{
background:#2f6fd1;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
padding:16px;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.box{
background:#2f6fd1;
color:yellow;
padding:24px;
text-align:center;
border-radius:10px;
font-size:22px;
}

button{
background:#2f6fd1;
color:yellow;
border:none;
padding:16px;
font-size:20px;
border-radius:10px;
margin-top:10px;
width:100%;
}

.backbtn{
background:#444;
color:white;
}

input,select{
width:100%;
padding:14px;
font-size:20px;
margin-bottom:10px;
}

.card{
background:white;
padding:16px;
border-radius:10px;
margin-bottom:12px;
}

.qtybtn{
width:50px;
height:50px;
font-size:24px;
}

.cancelled{
background:#ffd6d6;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="header">🐄 GOPAL GAUSHALA</div>

<div class="container">

<!-- HOME -->

<div id="home">

<div class="menu">

<div class="box" onclick="show('entry')">TODAY ENTRY</div>
<div class="box" onclick="show('master')">CUSTOMER MASTER</div>
<div class="box" onclick="show('billing')">BILLING</div>
<div class="box" onclick="show('payments')">PAYMENTS</div>
<div class="box" onclick="show('settings')">SETTINGS</div>
<div class="box" onclick="backup()">BACKUP</div>

</div>

</div>

<!-- CUSTOMER MASTER -->

<div id="master" class="hidden">

<h3>Add Customer</h3>

<input id="custName" placeholder="Name">

<input id="custPhone" placeholder="Phone">

<select id="custType">
<option value="P">Pickup</option>
<option value="D">Delivery</option>
</select>

<input id="custMorning" type="number" step="0.5" placeholder="Std Morning Qty">

<input id="custEvening" type="number" step="0.5" placeholder="Std Evening Qty">

<button onclick="saveCustomer()">SAVE CUSTOMER</button>

<button class="backbtn" onclick="show('home')">BACK</button>

</div>

<!-- ENTRY -->

<div id="entry" class="hidden">

<h3>Daily Entry</h3>

<input type="date" id="entryDate">

<div id="entryList"></div>

<button onclick="addExtra()">+ ADD CUSTOMER FOR TODAY</button>

<button class="backbtn" onclick="show('home')">BACK</button>

</div>

<!-- BILLING -->

<div id="billing" class="hidden">

<h3>Billing</h3>

<select id="billCustomer"></select>

<button onclick="alert('Billing logic next step')">GENERATE BILL</button>

<button class="backbtn" onclick="show('home')">BACK</button>

</div>

<!-- PAYMENTS -->

<div id="payments" class="hidden">

<h3>Payments</h3>

<select id="payCustomer"></select>

<input placeholder="Bill Amount">

<input placeholder="Received Amount">

<button>SAVE PAYMENT</button>

<button class="backbtn" onclick="show('home')">BACK</button>

</div>

<!-- SETTINGS -->

<div id="settings" class="hidden">

<h3>Rate Settings</h3>

Pickup Rate

<input id="pickupRate">

Delivery Rate

<input id="deliveryRate">

<button onclick="saveRates()">SAVE</button>

<button class="backbtn" onclick="show('home')">BACK</button>

</div>

</div>

<script>

/* navigation */

function show(id){

let pages=["home","master","entry","billing","payments","settings"]

pages.forEach(p=>{
document.getElementById(p).classList.add("hidden")
})

document.getElementById(id).classList.remove("hidden")

if(id=="entry")loadEntry()

if(id=="billing"||id=="payments")loadCustomers()

if(id=="settings")loadRates()

}

/* save customer */

function saveCustomer(){

let customers=JSON.parse(localStorage.getItem("customers")||"[]")

customers.push({
name:document.getElementById("custName").value,
phone:document.getElementById("custPhone").value,
type:document.getElementById("custType").value,
morning:document.getElementById("custMorning").value,
evening:document.getElementById("custEvening").value
})

localStorage.setItem("customers",JSON.stringify(customers))

document.getElementById("custName").value=""
document.getElementById("custPhone").value=""
document.getElementById("custMorning").value=""
document.getElementById("custEvening").value=""

alert("Customer saved")

}

/* load customers */

function loadCustomers(){

let customers=JSON.parse(localStorage.getItem("customers")||"[]")

let html=""

customers.forEach(c=>{
html+=`<option>${c.name}</option>`
})

if(document.getElementById("billCustomer"))
document.getElementById("billCustomer").innerHTML=html

if(document.getElementById("payCustomer"))
document.getElementById("payCustomer").innerHTML=html

}

/* entry screen */

function loadEntry(){

document.getElementById("entryDate").value=
new Date().toISOString().split("T")[0]

let customers=JSON.parse(localStorage.getItem("customers")||"[]")

let html=""

customers.forEach((c,i)=>{

html+=`

<div class="card" id="row${i}">

<b>${c.name} (${c.type})</b>

<br><br>

Morning

<br>

<button class="qtybtn" onclick="chg(${i},'m',-0.5)">-</button>
<span id="m${i}">${c.morning}</span>
<button class="qtybtn" onclick="chg(${i},'m',0.5)">+</button>

<br><br>

Evening

<br>

<button class="qtybtn" onclick="chg(${i},'e',-0.5)">-</button>
<span id="e${i}">${c.evening}</span>
<button class="qtybtn" onclick="chg(${i},'e',0.5)">+</button>

<br><br>

<button onclick="cancel(${i})">CANCEL TODAY</button>

</div>

`

})

document.getElementById("entryList").innerHTML=html

}

/* qty change */

function chg(i,type,val){

let el=document.getElementById(type+i)

let v=parseFloat(el.innerText)+val

if(v<0)v=0

el.innerText=v

}

/* cancel */

function cancel(i){

let row=document.getElementById("row"+i)

row.classList.toggle("cancelled")

}

/* add extra */

function addExtra(){

let name=prompt("Customer name")

if(!name)return

let div=document.createElement("div")

div.className="card"

div.innerHTML=`<b>${name} (extra)</b>`

document.getElementById("entryList").appendChild(div)

}

/* rate settings */

function saveRates(){

let rates={
pickup:document.getElementById("pickupRate").value,
delivery:document.getElementById("deliveryRate").value
}

localStorage.setItem("rates",JSON.stringify(rates))

alert("Rates saved")

}

function loadRates(){

let r=JSON.parse(localStorage.getItem("rates")||"{}")

document.getElementById("pickupRate").value=r.pickup||90
document.getElementById("deliveryRate").value=r.delivery||100

}

/* backup */

function backup(){

let data={
customers:localStorage.getItem("customers"),
rates:localStorage.getItem("rates")
}

let blob=new Blob([JSON.stringify(data)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="gaushala_backup.json"

a.click()

}

</script>

</body>
</html>
