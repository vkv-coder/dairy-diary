<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gopal Gaushala</title>

<style>
body{font-family:Arial;background:#eef1f5;margin:0}
.header{background:#2f69c6;color:white;text-align:center;padding:12px;font-size:20px;font-weight:bold}
.container{padding:15px;max-width:520px;margin:auto}
.menu button{display:block;width:100%;padding:14px;margin:8px 0;font-size:16px;background:#2f69c6;color:white;border:none;border-radius:6px}
.back{background:#444;width:100%;margin-top:10px}
</style>
</head>

<body>

<div class="header">🐄 GOPAL GAUSHALA</div>

<div class="container">

<div id="home">
<div class="menu">
<button onclick="openPage('entry')">TODAY ENTRY</button>
<button onclick="openPage('customer')">CUSTOMERS</button>
<button onclick="openPage('billing')">BILLING</button>
<button onclick="openPage('payment')">PAYMENT</button>
<button onclick="openPage('ledger')">LEDGER</button>
<button onclick="openPage('backup')">BACKUP DATA</button>
<button onclick="openPage('settings')">SETTINGS</button>
</div>
</div>

<div id="entry" style="display:none">
<h3>Daily Entry</h3>
<button class="back" onclick="openPage('home')">BACK</button>
</div>

<div id="customer" style="display:none">
<h3>Customer Master</h3>
<button class="back" onclick="openPage('home')">BACK</button>
</div>

<div id="billing" style="display:none">
<h3>Billing</h3>
<button class="back" onclick="openPage('home')">BACK</button>
</div>

<div id="payment" style="display:none">
<h3>Payment</h3>
<button class="back" onclick="openPage('home')">BACK</button>
</div>

<div id="ledger" style="display:none">
<h3>Ledger</h3>
<button class="back" onclick="openPage('home')">BACK</button>
</div>

<div id="backup" style="display:none">
<h3>Backup Data</h3>
<button onclick="downloadBackup()">Download Backup</button>
<br><br>
Restore Backup:
<input type="file" onchange="restoreBackup(event)">
<button class="back" onclick="openPage('home')">BACK</button>
</div>

<div id="settings" style="display:none">
<h3>Settings</h3>
<button class="back" onclick="openPage('home')">BACK</button>
</div>

</div>

<script>

function openPage(page){

let pages=["home","entry","customer","billing","payment","ledger","backup","settings"]

for(let i=0;i<pages.length;i++){
let p=pages[i]
let el=document.getElementById(p)
if(el) el.style.display="none"
}

let target=document.getElementById(page)
if(target) target.style.display="block"

}

function downloadBackup(){

let data={
customers:localStorage.getItem("customers"),
entries:localStorage.getItem("entries"),
payments:localStorage.getItem("payments"),
ratePickup:localStorage.getItem("ratePickup"),
rateDelivery:localStorage.getItem("rateDelivery")
}

let blob=new Blob([JSON.stringify(data)],{type:"application/json"})

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="milk_backup.json"
a.click()

}

function restoreBackup(e){

let file=e.target.files[0]

if(!file) return

let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(reader.result)

localStorage.setItem("customers",data.customers)
localStorage.setItem("entries",data.entries)
localStorage.setItem("payments",data.payments)
localStorage.setItem("ratePickup",data.ratePickup)
localStorage.setItem("rateDelivery",data.rateDelivery)

alert("Backup Restored")

}

reader.readAsText(file)

}

</script>

</body>
</html>
