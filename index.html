```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gopal Gaushala</title>
<link rel="icon" href="data:,">

<style>
body{font-family:Arial;background:#eef1f5;margin:0}
.header{background:#2f69c6;color:#fff;text-align:center;padding:12px;font-size:20px;font-weight:bold}
.container{padding:15px;max-width:520px;margin:auto}
.menu button{display:block;width:100%;padding:14px;margin:8px 0;font-size:16px;background:#2f69c6;color:#fff;border:none;border-radius:6px}
input,select{width:100%;padding:10px;margin:6px 0}
button{padding:10px;border:none;border-radius:6px;background:#2f69c6;color:#fff}
.back{background:#444;width:100%;margin-top:10px}
.row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:6px;margin-bottom:6px}
.smallbtn{padding:6px 8px;font-size:12px;margin-left:5px}
.table{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:6px;margin-bottom:5px}
</style>
</head>

<body>

<div class="header">🐄 GOPAL GAUSHALA</div>

<div class="container">

<div id="home">
<div class="menu">
<button onclick="openPage('entry')">TODAY ENTRY</button>
<button onclick="openPage('customer')">CUSTOMERS</button>
<button onclick="openPage('billing')">BILLING</button>
<button onclick="openPage('payment')">PAYMENT</button>
<button onclick="openPage('ledger')">LEDGER</button>
<button onclick="openPage('settings')">SETTINGS</button>
</div>
</div>

<!-- ENTRY -->
<div id="entry" style="display:none">
<h3>Daily Entry</h3>
<input type="date" id="entryDate">
<button onclick="loadEntry()">LOAD ENTRY</button>
<div id="entryTable"></div>
<button onclick="saveEntry()">SAVE ENTRY</button>
<button class="back" onclick="openPage('home')">BACK</button>
</div>

<!-- CUSTOMER -->
<div id="customer" style="display:none">
<h3>Customer Master</h3>

<input id="custName" placeholder="Name">
<input id="custPhone" placeholder="Phone">
<select id="custType">
<option>Pickup</option>
<option>Delivery</option>
</select>
<input id="custMorning" placeholder="Morning Qty">
<input id="custEvening" placeholder="Evening Qty">

<button onclick="saveCustomer()">SAVE CUSTOMER</button>

<div id="custList"></div>

<button class="back" onclick="openPage('home')">BACK</button>
</div>

<!-- BILLING -->
<div id="billing" style="display:none">
<h3>Billing</h3>

<select id="billType">
<option>All</option>
<option>Pickup</option>
<option>Delivery</option>
</select>

<input type="date" id="billFrom">
<input type="date" id="billTo">

<button onclick="generateBills()">GENERATE ALL BILLS</button>

<div class="table">
<b>Name</b>
<b>Milk</b>
<b>Rate</b>
<b>Bill</b>
<b></b>
</div>

<div id="billResult"></div>

<button class="back" onclick="openPage('home')">BACK</button>
</div>

<!-- PAYMENT -->
<div id="payment" style="display:none">
<h3>Payment</h3>

<select id="payCustomer" onchange="loadBalance()"></select>

<div id="payInfo"></div>

<input id="payAmount" placeholder="Amount">

<button onclick="savePayment()">SAVE PAYMENT</button>

<button class="back" onclick="openPage('home')">BACK</button>
</div>

<!-- LEDGER -->
<div id="ledger" style="display:none">
<h3>Ledger</h3>

<input type="date" id="ledgerFrom">
<input type="date" id="ledgerTo">

<button onclick="loadLedger()">LOAD LEDGER</button>

<div class="table">
<b>Name</b>
<b>Milk</b>
<b>Rate</b>
<b>Bill</b>
<b>Balance</b>
</div>

<div id="ledgerResult"></div>

<button class="back" onclick="openPage('home')">BACK</button>
</div>

<!-- SETTINGS -->
<div id="settings" style="display:none">
<h3>Rates</h3>

<input id="ratePickup" placeholder="Pickup Rate">
<input id="rateDelivery" placeholder="Delivery Rate">

<button onclick="saveRates()">SAVE</button>

<button class="back" onclick="openPage('home')">BACK</button>
</div>

</div>

<script>

function openPage(p){
["home","entry","customer","billing","payment","ledger","settings"].forEach(x=>document.getElementById(x).style.display="none")
document.getElementById(p).style.display="block"
if(p=="customer") loadCustomers()
if(p=="payment") loadPayCustomers()
}

function getCustomers(){
return JSON.parse(localStorage.getItem("customers")||"[]")
}

function saveCustomer(){

let c=getCustomers()

c.push({
name:custName.value,
phone:custPhone.value,
type:custType.value,
m:Number(custMorning.value||0),
e:Number(custEvening.value||0)
})

localStorage.setItem("customers",JSON.stringify(c))
loadCustomers()

}

function loadCustomers(){

let c=getCustomers()
let html=""

c.forEach((x,i)=>{

html+=`
<div>
${x.name} (${x.type})
<button class="smallbtn" onclick="editCustomer(${i})">Edit</button>
<button class="smallbtn" onclick="deleteCustomer(${i})">Delete</button>
</div>
`

})

custList.innerHTML=html

}

function deleteCustomer(i){

let c=getCustomers()
c.splice(i,1)
localStorage.setItem("customers",JSON.stringify(c))
loadCustomers()

}

function editCustomer(i){

let c=getCustomers()[i]

custName.value=c.name
custPhone.value=c.phone
custType.value=c.type
custMorning.value=c.m
custEvening.value=c.e

}

function loadEntry(){

let c=getCustomers()
let html=""

c.forEach(x=>{

html+=`
<div class="row">
<div>${x.name}</div>
<input type="number" step="0.5" id="m_${x.name}" value="${x.m}">
<input type="number" step="0.5" id="e_${x.name}" value="${x.e}">
</div>
`

})

entryTable.innerHTML=html

}

function saveEntry(){

let c=getCustomers()
let entries=JSON.parse(localStorage.getItem("entries")||"{}")
let date=entryDate.value

if(!entries[date]) entries[date]={}

c.forEach(x=>{

entries[date][x.name]={
m:Number(document.getElementById("m_"+x.name).value||0),
e:Number(document.getElementById("e_"+x.name).value||0)
}

})

localStorage.setItem("entries",JSON.stringify(entries))

alert("Saved")

}

function generateBills(){

let c=getCustomers()
let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let from=new Date(billFrom.value)
let to=new Date(billTo.value)

let type=billType.value

let html=""

c.forEach(x=>{

if(type!="All" && x.type!=type) return

let total=0

Object.keys(entries).forEach(d=>{

let dt=new Date(d)

if(dt>=from && dt<=to){

let day=entries[d]

if(day[x.name]){
total+=Number(day[x.name].m||0)+Number(day[x.name].e||0)
}

}

})

if(total>0){

let rate=x.type=="Pickup"?ratePickup.value:rateDelivery.value
let bill=total*rate

html+=`
<div class="table">
<div>${x.name}</div>
<div>${total}</div>
<div>${rate}</div>
<div>${bill}</div>
<div></div>
</div>
`

}

})

billResult.innerHTML=html

}

function loadPayCustomers(){

let c=getCustomers()

let html=""

c.forEach(x=>{
html+=`<option>${x.name}</option>`
})

payCustomer.innerHTML=html

}

function loadBalance(){

let name=payCustomer.value

let entries=JSON.parse(localStorage.getItem("entries")||"{}")
let payments=JSON.parse(localStorage.getItem("payments")||"{}")

let c=getCustomers().find(x=>x.name==name)

let rate=c.type=="Pickup"?ratePickup.value:rateDelivery.value

let total=0

Object.keys(entries).forEach(d=>{

if(entries[d][name]){
total+=Number(entries[d][name].m||0)+Number(entries[d][name].e||0)
}

})

let bill=total*rate

let paid=0

Object.keys(payments).forEach(d=>{
if(payments[d][name]) paid+=Number(payments[d][name])
})

let bal=bill-paid

payInfo.innerHTML=
"Milk: "+total+
"<br>Bill: ₹"+bill+
"<br>Paid: ₹"+paid+
"<br><b>Balance: ₹"+bal+"</b>"

}

function savePayment(){

let name=payCustomer.value
let amt=Number(payAmount.value)

let payments=JSON.parse(localStorage.getItem("payments")||"{}")

let d=new Date().toISOString().slice(0,10)

if(!payments[d]) payments[d]={}

payments[d][name]=amt

localStorage.setItem("payments",JSON.stringify(payments))

alert("Saved")

}

function loadLedger(){

let c=getCustomers()
let entries=JSON.parse(localStorage.getItem("entries")||"{}")

let from=new Date(ledgerFrom.value)
let to=new Date(ledgerTo.value)

let html=""

c.forEach(x=>{

let total=0

Object.keys(entries).forEach(d=>{

let dt=new Date(d)

if(dt>=from && dt<=to){

let day=entries[d]

if(day[x.name]){
total+=Number(day[x.name].m||0)+Number(day[x.name].e||0)
}

}

})

if(total>0){

let rate=x.type=="Pickup"?ratePickup.value:rateDelivery.value
let bill=total*rate

html+=`
<div class="table">
<div>${x.name}</div>
<div>${total}</div>
<div>${rate}</div>
<div>${bill}</div>
<div>${bill}</div>
</div>
`

}

})

ledgerResult.innerHTML=html

}

function saveRates(){

localStorage.setItem("ratePickup",ratePickup.value)
localStorage.setItem("rateDelivery",rateDelivery.value)

}

ratePickup.value=localStorage.getItem("ratePickup")||90
rateDelivery.value=localStorage.getItem("rateDelivery")||100

</script>

</body>
</html>
```
